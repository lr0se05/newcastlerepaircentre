services:
  newcastlerepaircentre-web:
    image: nginx:alpine
    container_name: newcastlerepaircentre-web
    ports:
      - "8090:80"
    volumes:
      - ./website:/usr/share/nginx/html:ro
    restart: unless-stopped

  newcastlerepaircentre-api:
    build: ./api
    container_name: newcastlerepaircentre-api
    ports:
      - "8011:8000"
    env_file:
      - .env
    restart: unless-stopped